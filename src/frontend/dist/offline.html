<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melody Beats – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 64px; }
    h1 { font-size: 24px; font-weight: 700; color: #d4a017; }
    p { font-size: 15px; color: #888; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #d4a017;
      color: #000;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🎵</div>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your music will be ready when you're back online.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
